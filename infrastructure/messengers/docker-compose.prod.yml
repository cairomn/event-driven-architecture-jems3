version: '3'
services:
  # Executa uma instância do Mosquitto para os sensores IoT.
  mosquitto:
    image: eclipse-mosquitto:1.5.5
    hostname: mosquitto
    container_name: mosquitto
    restart: always
    expose:
      - 1885
    ports:
      - "1885:1883"
    networks:
      - infra_network
    volumes:
      - ./mosquitto_prod/config/:/mosquitto/config/
      - ./mosquitto_prod/data/:/mosquitto/data/

  zookeeper1:
    image: zookeeper
    container_name: zookeeper1
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
    networks:
      - infra_network
    restart: always

  zookeeper2:
    image: zookeeper
    container_name: zookeeper2
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
    networks:
      - infra_network
    restart: always

  kafka1:
    image: confluentinc/cp-kafka
    container_name: kafka1
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper1:2181,zookeeper2:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://10.1.3.71:9092
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
    depends_on:
      - zookeeper1
      - zookeeper2
    ports:
      - 9092:9092
    expose:
      - 9092
    networks:
      - infra_network
    restart: always

  kafka2:
    image: confluentinc/cp-kafka
    container_name: kafka2
    environment:
      KAFKA_BROKER_ID: 2
      KAFKA_ZOOKEEPER_CONNECT: zookeeper1:2181,zookeeper2:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://10.1.3.71:9093
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
    depends_on:
      - zookeeper1
      - zookeeper2
    ports:
      - 9093:9092
    expose:
      - 9093
    networks:
      - infra_network
    restart: always

  kafka3:
    image: confluentinc/cp-kafka
    container_name: kafka3
    environment:
      KAFKA_BROKER_ID: 3
      KAFKA_ZOOKEEPER_CONNECT: zookeeper1:2181,zookeeper2:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://10.1.3.71:9094
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
    depends_on:
      - zookeeper1
      - zookeeper2
    ports:
      - 9094:9092
    expose:
      - 9094
    networks:
      - infra_network
    restart: always

  kafka4:
    image: confluentinc/cp-kafka
    container_name: kafka4
    environment:
      KAFKA_BROKER_ID: 4
      KAFKA_ZOOKEEPER_CONNECT: zookeeper1:2181,zookeeper2:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://10.1.3.71:9095
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
    depends_on:
      - zookeeper1
      - zookeeper2
    ports:
      - 9095:9092
    expose:
      - 9095
    networks:
      - infra_network
    restart: always

networks:
  infra_network:
    name: infra_network
    driver: bridge